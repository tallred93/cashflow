<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CashFlow">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>CashFlow</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #334155;
    --border: #475569;
    --text: #f1f5f9;
    --text-dim: #94a3b8;
    --accent: #38bdf8;
    --accent-dim: #0284c7;
    --green: #34d399;
    --green-dim: #065f46;
    --red: #f87171;
    --red-dim: #991b1b;
    --yellow: #fbbf24;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* ── Navigation ── */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--surface2);
    display: flex;
    padding-bottom: var(--safe-bottom);
    z-index: 100;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 10px 0 8px;
    background: none; border: none; color: var(--text-dim);
    font-size: 10px; font-weight: 600; letter-spacing: 0.3px;
    cursor: pointer; transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* ── Screens ── */
  .screen { display: none; padding: 20px 16px; animation: fadeIn 0.2s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .screen-title {
    font-size: 28px; font-weight: 700; margin-bottom: 20px; letter-spacing: -0.5px;
  }

  /* ── Cards ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-label { font-size: 13px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  .card-sub { font-size: 14px; color: var(--text-dim); margin-top: 4px; }

  /* ── Progress Bar ── */
  .progress-track {
    width: 100%; height: 10px; background: var(--surface2);
    border-radius: 5px; overflow: hidden; margin-top: 12px;
  }
  .progress-fill {
    height: 100%; border-radius: 5px; transition: width 0.5s ease;
  }

  /* ── Savings Status ── */
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 700;
  }
  .status-badge.on-track { background: var(--green-dim); color: var(--green); }
  .status-badge.off-track { background: var(--red-dim); color: var(--red); }
  .status-badge.warning { background: #78350f; color: var(--yellow); }

  /* ── Category Grid ── */
  .cat-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-bottom: 20px;
  }
  .cat-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 4px; background: var(--surface); border: 2px solid transparent;
    border-radius: 14px; color: var(--text-dim); font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .cat-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.08); }
  .cat-btn .cat-icon { font-size: 26px; }

  /* ── Income/Expense Toggle ── */
  .type-toggle {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .type-btn {
    flex: 1; padding: 12px; border-radius: 12px; border: 2px solid var(--surface2);
    background: var(--surface); color: var(--text-dim); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s;
  }
  .type-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(56, 189, 248, 0.08); }
  .type-btn.active.income { border-color: var(--green); color: var(--green); background: rgba(52, 211, 153, 0.08); }

  /* ── Amount Input ── */
  .amount-display {
    text-align: center; padding: 24px 0 20px;
  }
  .amount-display .dollar { font-size: 24px; color: var(--text-dim); font-weight: 300; vertical-align: top; margin-right: 2px; }
  .amount-display .value { font-size: 56px; font-weight: 700; letter-spacing: -2px; }

  .numpad {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    max-width: 340px; margin: 0 auto;
  }
  .num-btn {
    height: 58px; border-radius: 14px; border: none;
    background: var(--surface); color: var(--text);
    font-size: 22px; font-weight: 600;
    cursor: pointer; transition: background 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .num-btn:active { background: var(--surface2); }
  .num-btn.action { background: var(--accent); color: var(--bg); font-size: 16px; font-weight: 700; }
  .num-btn.action:active { background: var(--accent-dim); }
  .num-btn.action.income { background: var(--green); }
  .num-btn.action.income:active { background: #047857; }
  .num-btn.del { font-size: 18px; }

  /* ── Note Input ── */
  .note-input {
    width: 100%; padding: 14px 16px; margin-bottom: 16px;
    background: var(--surface); border: 1px solid var(--surface2);
    border-radius: 12px; color: var(--text); font-size: 16px;
    font-family: inherit; outline: none;
  }
  .note-input::placeholder { color: var(--text-dim); }
  .note-input:focus { border-color: var(--accent); }

  /* ── Category Breakdown ── */
  .breakdown-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0; border-bottom: 1px solid var(--surface2);
  }
  .breakdown-row:last-child { border-bottom: none; }
  .breakdown-icon { font-size: 22px; width: 36px; text-align: center; }
  .breakdown-info { flex: 1; }
  .breakdown-name { font-size: 15px; font-weight: 600; }
  .breakdown-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .breakdown-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s ease; }
  .breakdown-amount { font-size: 15px; font-weight: 700; }

  /* ── History List ── */
  .history-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 0; border-bottom: 1px solid var(--surface2);
    cursor: pointer; transition: opacity 0.2s;
  }
  .history-item:hover { opacity: 0.7; }
  .history-item:last-child { border-bottom: none; }
  .history-item.income { color: var(--green); }
  .history-icon { font-size: 22px; width: 36px; text-align: center; }
  .history-info { flex: 1; }
  .history-cat { font-size: 14px; font-weight: 600; }
  .history-note { font-size: 12px; color: var(--text-dim); }
  .history-right { text-align: right; }
  .history-amount { font-size: 15px; font-weight: 700; }
  .history-date { font-size: 11px; color: var(--text-dim); }
  .history-delete {
    background: none; border: none; color: var(--text-dim); padding: 8px;
    font-size: 16px; cursor: pointer; border-radius: 8px;
  }
  .history-delete:active { background: var(--red-dim); color: var(--red); }

  /* ── Settings ── */
  .setting-group { margin-bottom: 24px; }
  .setting-label { font-size: 13px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .setting-input {
    width: 100%; padding: 14px 16px; background: var(--surface);
    border: 1px solid var(--surface2); border-radius: 12px;
    color: var(--text); font-size: 18px; font-weight: 600;
    font-family: inherit; outline: none;
  }
  .setting-input:focus { border-color: var(--accent); }
  .setting-hint { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

  /* ── Month Picker ── */
  .month-nav {
    display: flex; align-items: center; justify-content: center; gap: 20px;
    margin-bottom: 20px;
  }
  .month-nav button {
    background: var(--surface); border: none; color: var(--text);
    width: 36px; height: 36px; border-radius: 10px;
    font-size: 18px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }
  .month-nav button:active { background: var(--surface2); }
  .month-nav .month-label { font-size: 17px; font-weight: 700; min-width: 140px; text-align: center; }

  /* ── Row Layout ── */
  .row { display: flex; gap: 12px; }
  .row > * { flex: 1; }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 48px 20px; color: var(--text-dim);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; line-height: 1.5; }

  /* ── Export Button ── */
  .export-btn {
    width: 100%; padding: 14px; margin-top: 12px;
    background: var(--surface); border: 1px solid var(--surface2);
    border-radius: 12px; color: var(--text); font-size: 15px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }
  .export-btn:active { background: var(--surface2); }

  /* ── Recurring Section ── */
  .recurring-section { display: none; }
  .recurring-section.show { display: block; }
  .recurring-list {
    margin-top: 12px;
  }
  .recurring-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--surface2); border-radius: 10px;
    margin-bottom: 8px;
  }
  .recurring-item-info { flex: 1; }
  .recurring-item-name { font-size: 14px; font-weight: 600; }
  .recurring-item-freq { font-size: 12px; color: var(--text-dim); }
  .recurring-item-amount { font-size: 14px; font-weight: 700; color: var(--green); }
  .recurring-item-del {
    background: none; border: none; color: var(--text-dim);
    font-size: 16px; cursor: pointer; padding: 4px 8px;
  }
  .recurring-form {
    background: var(--surface2); border-radius: 12px; padding: 12px;
    margin-top: 12px;
  }
  .recurring-form input, .recurring-form select {
    width: 100%; padding: 10px; margin-bottom: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
  }
  .recurring-form select { cursor: pointer; }
  .recurring-form button {
    width: 100%; padding: 10px; background: var(--green);
    color: var(--bg); border: none; border-radius: 8px;
    font-weight: 600; cursor: pointer; font-family: inherit;
  }

  /* ── Sync Status ── */
  .sync-status {
    font-size: 12px; color: var(--text-dim); margin-top: 6px;
    text-align: center;
  }
  .sync-status.synced { color: var(--green); }
  .sync-status.syncing { color: var(--yellow); }
  .sync-status.error { color: var(--red); }

  /* ── Snackbar ── */
  .snackbar {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--green); color: var(--bg); padding: 12px 24px;
    border-radius: 12px; font-size: 14px; font-weight: 700;
    z-index: 200; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .snackbar.show { opacity: 1; }

  /* ── Confirm Dialog ── */
  .dialog-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .dialog-overlay.show { display: flex; }
  .dialog-box {
    background: var(--surface); border-radius: 20px; padding: 24px;
    max-width: 300px; width: 100%; text-align: center;
  }
  .dialog-box p { font-size: 16px; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
  .dialog-actions { display: flex; gap: 10px; }
  .dialog-actions button {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .dialog-cancel { background: var(--surface2); color: var(--text); }
  .dialog-confirm { background: var(--red); color: white; }
</style>
</head>
<body>

<!-- ══════════════ DASHBOARD ══════════════ -->
<div id="screen-dashboard" class="screen active">
  <div class="screen-title">CashFlow</div>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8249;</button>
    <span class="month-label" id="dashMonthLabel"></span>
    <button onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="row">
    <div class="card">
      <div class="card-label">Net Spent</div>
      <div class="card-value" id="totalSpent">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Remaining</div>
      <div class="card-value" id="totalRemaining">$0</div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="card-label" style="margin-bottom:0">Savings Goal</div>
      <span id="savingsStatus"></span>
    </div>
    <div id="savingsDetail" class="card-sub"></div>
    <div class="progress-track">
      <div class="progress-fill" id="savingsProgress"></div>
    </div>
    <div class="card-sub" id="savingsSubtext" style="margin-top:8px"></div>
  </div>

  <div class="card">
    <div class="card-label">Spending by Category</div>
    <div id="categoryBreakdown"></div>
  </div>
</div>

<!-- ══════════════ ADD EXPENSE/INCOME ══════════════ -->
<div id="screen-add" class="screen">
  <div class="screen-title" id="addScreenTitle">Add Expense</div>

  <div class="type-toggle">
    <button class="type-btn active" onclick="switchType('expense')" id="expenseTypeBtn">💰 Expense</button>
    <button class="type-btn" onclick="switchType('income')" id="incomeTypeBtn">💸 Income</button>
  </div>

  <div class="cat-grid" id="catGrid"></div>

  <div class="amount-display">
    <span class="dollar">$</span><span class="value" id="amountValue">0</span>
  </div>

  <input type="text" class="note-input" id="noteInput" placeholder="Add a note (optional)" maxlength="60">

  <div class="numpad">
    <button class="num-btn" onclick="numPress('1')">1</button>
    <button class="num-btn" onclick="numPress('2')">2</button>
    <button class="num-btn" onclick="numPress('3')">3</button>
    <button class="num-btn" onclick="numPress('4')">4</button>
    <button class="num-btn" onclick="numPress('5')">5</button>
    <button class="num-btn" onclick="numPress('6')">6</button>
    <button class="num-btn" onclick="numPress('7')">7</button>
    <button class="num-btn" onclick="numPress('8')">8</button>
    <button class="num-btn" onclick="numPress('9')">9</button>
    <button class="num-btn" onclick="numPress('.')">.</button>
    <button class="num-btn" onclick="numPress('0')">0</button>
    <button class="num-btn del" onclick="numDelete()">&#9003;</button>
  </div>

  <div style="max-width:340px;margin:12px auto 0">
    <button class="num-btn action" style="width:100%;height:52px" id="saveBtn" onclick="saveExpense()">Save Expense</button>
  </div>
</div>

<!-- ══════════════ HISTORY ══════════════ -->
<div id="screen-history" class="screen">
  <div class="screen-title">History</div>
  <div class="month-nav">
    <button onclick="changeHistMonth(-1)">&#8249;</button>
    <span class="month-label" id="histMonthLabel"></span>
    <button onclick="changeHistMonth(1)">&#8250;</button>
  </div>
  <div id="historyList"></div>
</div>

<!-- ══════════════ SETTINGS ══════════════ -->
<div id="screen-settings" class="screen">
  <div class="screen-title">Settings</div>

  <div class="setting-group">
    <div class="setting-label">Monthly Income (after tax)</div>
    <input type="number" class="setting-input" id="inputIncome" placeholder="0" inputmode="decimal">
    <div class="setting-hint">Your take-home pay each month</div>
  </div>

  <div class="setting-group">
    <div class="setting-label">Monthly Investments</div>
    <input type="number" class="setting-input" id="inputInvest" placeholder="0" inputmode="decimal">
    <div class="setting-hint">401k, IRA, brokerage, etc.</div>
  </div>

  <div class="setting-group">
    <div class="setting-label">Savings Target (%)</div>
    <input type="number" class="setting-input" id="inputTarget" placeholder="20" inputmode="numeric" min="0" max="100">
    <div class="setting-hint">Percentage of income you want to save each month</div>
  </div>

  <button class="num-btn action" style="width:100%;height:52px;margin-top:8px" onclick="saveSettings()">Save Settings</button>

  <div style="margin-top:24px; padding-top:20px; border-top:1px solid var(--surface2)">
    <div class="setting-label">Recurring Expenses</div>
    <button class="export-btn" onclick="toggleRecurringSection()">Manage Recurring</button>

    <div class="recurring-section" id="recurringSection">
      <div class="recurring-list" id="recurringList"></div>

      <div class="recurring-form">
        <input type="text" id="recName" placeholder="Name (e.g., Netflix)" maxlength="30">
        <input type="number" id="recAmount" placeholder="Amount" inputmode="decimal">
        <select id="recCategory">
          <option value="food">Food</option>
          <option value="transport">Transport</option>
          <option value="bills">Bills</option>
          <option value="entertain">Fun</option>
          <option value="shopping">Shopping</option>
          <option value="health">Health</option>
          <option value="home">Home</option>
          <option value="other">Other</option>
        </select>
        <select id="recFreq">
          <option value="weekly">Weekly</option>
          <option value="biweekly">Biweekly</option>
          <option value="monthly">Monthly</option>
        </select>
        <button onclick="addRecurring()">Add Recurring</button>
      </div>
    </div>
  </div>

  <button class="export-btn" onclick="syncToSheets()" style="margin-top:24px" id="syncBtn">Sync to Google Sheets</button>
  <div class="sync-status" id="syncStatus"></div>

  <button class="export-btn" onclick="exportData()" style="margin-top:12px">Export All Data (JSON)</button>
  <button class="export-btn" onclick="importData()">Import Data (JSON)</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

  <button class="export-btn" onclick="confirmClearData()" style="margin-top:8px;border-color:var(--red);color:var(--red)">Clear All Data</button>
</div>

<!-- ══════════════ NAV BAR ══════════════ -->
<nav class="nav">
  <button class="nav-btn active" data-screen="dashboard" onclick="switchScreen('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="nav-btn" data-screen="add" onclick="switchScreen('add')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Add
  </button>
  <button class="nav-btn" data-screen="history" onclick="switchScreen('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    History
  </button>
  <button class="nav-btn" data-screen="settings" onclick="switchScreen('settings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    Settings
  </button>
</nav>

<!-- Snackbar -->
<div class="snackbar" id="snackbar"></div>

<!-- Confirm Dialog -->
<div class="dialog-overlay" id="dialog">
  <div class="dialog-box">
    <p id="dialogMsg"></p>
    <div class="dialog-actions">
      <button class="dialog-cancel" onclick="closeDialog()">Cancel</button>
      <button class="dialog-confirm" id="dialogConfirm">Delete</button>
    </div>
  </div>
</div>

<script>
// ── Categories ──
const CATEGORIES = [
  { id: 'food', name: 'Food', icon: '🍔' },
  { id: 'transport', name: 'Transport', icon: '🚗' },
  { id: 'bills', name: 'Bills', icon: '📄' },
  { id: 'entertain', name: 'Fun', icon: '🎬' },
  { id: 'shopping', name: 'Shopping', icon: '🛍️' },
  { id: 'health', name: 'Health', icon: '💊' },
  { id: 'home', name: 'Home', icon: '🏠' },
  { id: 'other', name: 'Other', icon: '📌' },
];

const INCOME_CATEGORIES = [
  { id: 'payback', name: 'Payback', icon: '💸' },
  { id: 'freelance', name: 'Freelance', icon: '💻' },
  { id: 'gift', name: 'Gift', icon: '🎁' },
  { id: 'refund', name: 'Refund', icon: '↩️' },
  { id: 'other', name: 'Other', icon: '📌' },
];

const CAT_COLORS = {
  food: '#f87171', transport: '#38bdf8', bills: '#a78bfa',
  entertain: '#fbbf24', shopping: '#fb923c', health: '#34d399',
  home: '#f472b6', other: '#94a3b8'
};

const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzYxtx9HXA6AwaP-7nM4e17TsCtlW_LJuZ_NZKVBjiiWNyqAOdn_ufA9InviLfN2FGwYQ/exec';

// ── State ──
let settings = loadJSON('cf_settings', { income: 0, invest: 0, target: 20 });
let expenses = loadJSON('cf_expenses', []);
let recurring = loadJSON('cf_recurring', []);
let recurringLog = loadJSON('cf_recurring_log', {});

let selectedCat = 'food';
let amountStr = '0';
let viewMonth = getCurrentMonthKey();
let histMonth = getCurrentMonthKey();
let currentType = 'expense';
let editingExpenseId = null;

// ── Helpers ──
function loadJSON(key, fallback) {
  try { const d = localStorage.getItem(key); return d ? JSON.parse(d) : fallback; }
  catch { return fallback; }
}
function saveJSON(key, data) { localStorage.setItem(key, JSON.stringify(data)); }
function getCurrentMonthKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function parseMonthKey(k) { const [y,m] = k.split('-').map(Number); return { year: y, month: m }; }
function monthKeyOffset(key, offset) {
  const {year, month} = parseMonthKey(key);
  const d = new Date(year, month - 1 + offset, 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function formatMonthLabel(key) {
  const {year, month} = parseMonthKey(key);
  return new Date(year, month-1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
}
function fmt(n) { return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtShort(n) {
  if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'k';
  return '$' + Math.round(n);
}
function getMonthExpenses(key) { return expenses.filter(e => e.date.startsWith(key) && (e.type || 'expense') === 'expense'); }
function getMonthIncome(key) { return expenses.filter(e => e.date.startsWith(key) && e.type === 'income'); }

function showSnack(msg) {
  const el = document.getElementById('snackbar');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

// ── Screen Switching ──
function switchScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.screen === name));
  if (name === 'dashboard') renderDashboard();
  if (name === 'history') renderHistory();
  if (name === 'settings') populateSettings();
  if (name === 'add' && !editingExpenseId) resetAddScreen();
}

// ── Dashboard ──
function renderDashboard() {
  const monthExp = getMonthExpenses(viewMonth);
  const monthInc = getMonthIncome(viewMonth);
  const totalExpenses = monthExp.reduce((s,e) => s + e.amount, 0);
  const totalIncome = monthInc.reduce((s,e) => s + e.amount, 0);
  const netSpent = totalExpenses - totalIncome;
  const spendBudget = settings.income - settings.invest;
  const remaining = spendBudget - netSpent;
  const savingsTarget = settings.income * (settings.target / 100);
  const actualSavings = settings.income - settings.invest - netSpent;
  const isCurrentMonth = viewMonth === getCurrentMonthKey();

  document.getElementById('dashMonthLabel').textContent = formatMonthLabel(viewMonth);
  document.getElementById('totalSpent').textContent = fmt(netSpent);
  document.getElementById('totalRemaining').textContent = fmt(Math.max(0, remaining));
  document.getElementById('totalRemaining').style.color = remaining >= 0 ? 'var(--green)' : 'var(--red)';

  const statusEl = document.getElementById('savingsStatus');
  const {year, month} = parseMonthKey(viewMonth);
  const daysInMonth = new Date(year, month, 0).getDate();
  const today = new Date();
  const dayOfMonth = isCurrentMonth ? today.getDate() : daysInMonth;
  const pctThrough = dayOfMonth / daysInMonth;

  if (settings.income <= 0) {
    statusEl.innerHTML = '<span class="status-badge warning">Set income</span>';
    document.getElementById('savingsDetail').textContent = 'Configure your income in Settings';
    document.getElementById('savingsProgress').style.width = '0%';
    document.getElementById('savingsProgress').style.background = 'var(--text-dim)';
    document.getElementById('savingsSubtext').textContent = '';
  } else {
    const expectedSpendNow = spendBudget * pctThrough;
    const onTrack = netSpent <= expectedSpendNow * 1.05;
    const close = netSpent <= expectedSpendNow * 1.15;

    if (onTrack) {
      statusEl.innerHTML = '<span class="status-badge on-track">On Track</span>';
    } else if (close) {
      statusEl.innerHTML = '<span class="status-badge warning">Watch It</span>';
    } else {
      statusEl.innerHTML = '<span class="status-badge off-track">Over Budget</span>';
    }

    const savingsPct = settings.income > 0 ? Math.max(0, (actualSavings / settings.income) * 100) : 0;
    const progressPct = Math.min(100, (savingsPct / settings.target) * 100);
    const progressColor = savingsPct >= settings.target ? 'var(--green)' : savingsPct >= settings.target * 0.7 ? 'var(--yellow)' : 'var(--red)';

    document.getElementById('savingsDetail').textContent = `Saving ${fmt(Math.max(0, actualSavings))} of ${fmt(savingsTarget)} target`;
    document.getElementById('savingsProgress').style.width = progressPct + '%';
    document.getElementById('savingsProgress').style.background = progressColor;
    document.getElementById('savingsSubtext').textContent = isCurrentMonth
      ? `${Math.round(pctThrough*100)}% through the month · ${fmt(Math.max(0, remaining))} left to spend`
      : `Final: saved ${savingsPct.toFixed(1)}% of income`;
  }

  const container = document.getElementById('categoryBreakdown');
  const catTotals = {};
  monthExp.forEach(e => { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
  const maxCat = Math.max(...Object.values(catTotals), 1);

  const sorted = CATEGORIES.filter(c => catTotals[c.id]).sort((a,b) => (catTotals[b.id]||0) - (catTotals[a.id]||0));

  if (sorted.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>No expenses yet this month.<br>Tap + to add one!</p></div>';
  } else {
    container.innerHTML = sorted.map(c => `
      <div class="breakdown-row">
        <div class="breakdown-icon">${c.icon}</div>
        <div class="breakdown-info">
          <div class="breakdown-name">${c.name}</div>
          <div class="breakdown-bar"><div class="breakdown-bar-fill" style="width:${(catTotals[c.id]/maxCat)*100}%;background:${CAT_COLORS[c.id]}"></div></div>
        </div>
        <div class="breakdown-amount">${fmt(catTotals[c.id])}</div>
      </div>
    `).join('');
  }
}

function changeMonth(dir) { viewMonth = monthKeyOffset(viewMonth, dir); renderDashboard(); }
function changeHistMonth(dir) { histMonth = monthKeyOffset(histMonth, dir); renderHistory(); }

// ── Add Expense/Income ──
function switchType(type) {
  currentType = type;
  const isExpense = type === 'expense';
  document.getElementById('expenseTypeBtn').classList.toggle('active', isExpense);
  document.getElementById('incomeTypeBtn').classList.toggle('active', !isExpense);

  const saveBtn = document.getElementById('saveBtn');
  if (isExpense) {
    saveBtn.classList.remove('income');
    saveBtn.textContent = editingExpenseId ? 'Update Expense' : 'Save Expense';
  } else {
    saveBtn.classList.add('income');
    saveBtn.textContent = editingExpenseId ? 'Update Income' : 'Save Income';
  }

  document.getElementById('addScreenTitle').textContent = isExpense ? 'Add Expense' : 'Add Income';
  buildCatGrid();
}

function buildCatGrid() {
  const cats = currentType === 'expense' ? CATEGORIES : INCOME_CATEGORIES;
  const grid = document.getElementById('catGrid');
  grid.innerHTML = cats.map(c => `
    <button class="cat-btn ${c.id === selectedCat ? 'selected' : ''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.name}
    </button>
  `).join('');
}

function selectCat(id) {
  selectedCat = id;
  buildCatGrid();
}

function numPress(key) {
  if (key === '.' && amountStr.includes('.')) return;
  if (key === '.' && amountStr === '0') { amountStr = '0.'; }
  else if (amountStr === '0' && key !== '.') { amountStr = key; }
  else {
    const parts = amountStr.split('.');
    if (parts[1] && parts[1].length >= 2) return;
    amountStr += key;
  }
  document.getElementById('amountValue').textContent = amountStr;
}

function numDelete() {
  amountStr = amountStr.length > 1 ? amountStr.slice(0, -1) : '0';
  document.getElementById('amountValue').textContent = amountStr;
}

function resetAddScreen() {
  amountStr = '0';
  document.getElementById('amountValue').textContent = '0';
  document.getElementById('noteInput').value = '';
  editingExpenseId = null;
  currentType = 'expense';
  selectedCat = 'food';
  switchType('expense');
}

function editExpense(id) {
  const exp = expenses.find(e => e.id === id);
  if (!exp) return;

  editingExpenseId = id;
  currentType = exp.type || 'expense';
  selectedCat = exp.category;
  amountStr = String(exp.amount);
  document.getElementById('noteInput').value = exp.note || '';

  switchType(currentType);
  document.getElementById('amountValue').textContent = amountStr;

  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = currentType === 'expense' ? 'Update Expense' : 'Update Income';

  switchScreen('add');
}

function saveExpense() {
  const amount = parseFloat(amountStr);
  if (!amount || amount <= 0) { showSnack('Enter an amount'); return; }

  const expenseData = {
    amount,
    category: selectedCat,
    note: document.getElementById('noteInput').value.trim(),
    date: new Date().toISOString().split('T')[0],
    time: new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }),
    type: currentType
  };

  if (editingExpenseId) {
    const idx = expenses.findIndex(e => e.id === editingExpenseId);
    if (idx >= 0) {
      expenses[idx] = { ...expenses[idx], ...expenseData };
    }
  } else {
    expenseData.id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    expenses.push(expenseData);
  }

  saveJSON('cf_expenses', expenses);
  showSnack(editingExpenseId ? `${fmt(amount)} updated!` : `${fmt(amount)} saved!`);
  resetAddScreen();
  syncExpenses();

  if (navigator.vibrate) navigator.vibrate(10);
}

// ── History ──
function renderHistory() {
  document.getElementById('histMonthLabel').textContent = formatMonthLabel(histMonth);
  const monthExp = expenses.filter(e => e.date.startsWith(histMonth)).sort((a,b) => b.id.localeCompare(a.id));
  const container = document.getElementById('historyList');

  if (monthExp.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📝</div><p>No expenses recorded<br>for this month.</p></div>';
    return;
  }

  const groups = {};
  monthExp.forEach(e => {
    if (!groups[e.date]) groups[e.date] = [];
    groups[e.date].push(e);
  });

  let html = '';
  for (const [date, items] of Object.entries(groups)) {
    const d = new Date(date + 'T12:00:00');
    const dayLabel = d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    const dayTotal = items.reduce((s,e) => {
      const type = e.type || 'expense';
      return type === 'income' ? s - e.amount : s + e.amount;
    }, 0);

    html += `<div class="card">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div class="card-label" style="margin-bottom:0">${dayLabel}</div>
        <div style="font-size:13px;font-weight:700;color:var(--text-dim)">${fmt(dayTotal)}</div>
      </div>`;

    items.forEach(e => {
      const type = e.type || 'expense';
      const cats = type === 'income' ? INCOME_CATEGORIES : CATEGORIES;
      const cat = cats.find(c => c.id === e.category) || cats[cats.length - 1];
      const isIncome = type === 'income';

      html += `
        <div class="history-item ${isIncome ? 'income' : ''}" onclick="editExpense('${e.id}')">
          <div class="history-icon">${cat.icon}</div>
          <div class="history-info">
            <div class="history-cat">${cat.name}</div>
            ${e.note ? `<div class="history-note">${e.note}</div>` : ''}
          </div>
          <div class="history-right">
            <div class="history-amount">${isIncome ? '+' : ''}${fmt(e.amount)}</div>
            ${e.time ? `<div class="history-date">${e.time}</div>` : ''}
          </div>
          <button class="history-delete" onclick="event.stopPropagation();confirmDeleteExpense('${e.id}')">&#x2715;</button>
        </div>`;
    });

    html += '</div>';
  }

  container.innerHTML = html;
}

// ── Delete Expense ──
let pendingDeleteId = null;
function confirmDeleteExpense(id) {
  pendingDeleteId = id;
  document.getElementById('dialogMsg').textContent = 'Delete this item?';
  document.getElementById('dialogConfirm').textContent = 'Delete';
  document.getElementById('dialogConfirm').onclick = () => {
    expenses = expenses.filter(e => e.id !== pendingDeleteId);
    saveJSON('cf_expenses', expenses);
    closeDialog();
    renderHistory();
    showSnack('Deleted');
    syncExpenses();
  };
  document.getElementById('dialog').classList.add('show');
}

function confirmClearData() {
  document.getElementById('dialogMsg').textContent = 'Clear ALL data? This cannot be undone.';
  document.getElementById('dialogConfirm').textContent = 'Clear';
  document.getElementById('dialogConfirm').onclick = () => {
    localStorage.removeItem('cf_expenses');
    localStorage.removeItem('cf_settings');
    localStorage.removeItem('cf_recurring');
    localStorage.removeItem('cf_recurring_log');
    expenses = [];
    settings = { income: 0, invest: 0, target: 20 };
    recurring = [];
    recurringLog = {};
    closeDialog();
    switchScreen('dashboard');
    showSnack('All data cleared');
  };
  document.getElementById('dialog').classList.add('show');
}

function closeDialog() { document.getElementById('dialog').classList.remove('show'); }

// ── Settings ──
function populateSettings() {
  document.getElementById('inputIncome').value = settings.income || '';
  document.getElementById('inputInvest').value = settings.invest || '';
  document.getElementById('inputTarget').value = settings.target || 20;
  renderRecurringList();
}

function saveSettings() {
  settings.income = parseFloat(document.getElementById('inputIncome').value) || 0;
  settings.invest = parseFloat(document.getElementById('inputInvest').value) || 0;
  settings.target = parseFloat(document.getElementById('inputTarget').value) || 20;
  saveJSON('cf_settings', settings);
  showSnack('Settings saved!');
  syncSettings();
}

// ── Recurring Expenses ──
function toggleRecurringSection() {
  const section = document.getElementById('recurringSection');
  section.classList.toggle('show');
}

function renderRecurringList() {
  const list = document.getElementById('recurringList');
  if (recurring.length === 0) {
    list.innerHTML = '<p style="text-align:center;color:var(--text-dim);padding:12px">No recurring expenses yet</p>';
    return;
  }

  list.innerHTML = recurring.map(r => `
    <div class="recurring-item">
      <div class="recurring-item-info">
        <div class="recurring-item-name">${r.name}</div>
        <div class="recurring-item-freq">${r.frequency} · ${r.category}</div>
      </div>
      <div class="recurring-item-amount">${fmt(r.amount)}</div>
      <button class="recurring-item-del" onclick="deleteRecurring('${r.id}')">&#x2715;</button>
    </div>
  `).join('');
}

function addRecurring() {
  const name = document.getElementById('recName').value.trim();
  const amount = parseFloat(document.getElementById('recAmount').value);
  const category = document.getElementById('recCategory').value;
  const freq = document.getElementById('recFreq').value;

  if (!name || !amount || amount <= 0) {
    showSnack('Fill in all fields');
    return;
  }

  recurring.push({
    id: Date.now().toString(36),
    name, amount, category, frequency: freq
  });

  saveJSON('cf_recurring', recurring);

  // Immediately generate an expense for this recurring item
  addGeneratedExpense(recurring[recurring.length - 1]);
  saveJSON('cf_expenses', expenses);
  renderDashboard();

  document.getElementById('recName').value = '';
  document.getElementById('recAmount').value = '';
  document.getElementById('recCategory').value = 'food';
  document.getElementById('recFreq').value = 'monthly';
  renderRecurringList();
  showSnack('Recurring added & expense logged!');
}

function deleteRecurring(id) {
  recurring = recurring.filter(r => r.id !== id);
  saveJSON('cf_recurring', recurring);
  renderRecurringList();
  showSnack('Recurring deleted');
}

function generateRecurringExpenses() {
  const currentMonth = getCurrentMonthKey();
  if (!recurringLog[currentMonth]) recurringLog[currentMonth] = {};
  let added = false;

  recurring.forEach(r => {
    if (recurringLog[currentMonth][r.id]) return; // already generated

    if (r.frequency === 'monthly') {
      addGeneratedExpense(r);
      recurringLog[currentMonth][r.id] = true;
      added = true;
    } else if (r.frequency === 'weekly') {
      // Generate ~4 weekly entries for the month
      for (let w = 0; w < 4; w++) {
        addGeneratedExpense(r);
      }
      recurringLog[currentMonth][r.id] = true;
      added = true;
    } else if (r.frequency === 'biweekly') {
      // Generate 2 biweekly entries for the month
      for (let w = 0; w < 2; w++) {
        addGeneratedExpense(r);
      }
      recurringLog[currentMonth][r.id] = true;
      added = true;
    }
  });

  if (added) {
    saveJSON('cf_expenses', expenses);
    saveJSON('cf_recurring_log', recurringLog);
  }
}

function addGeneratedExpense(rec) {
  const today = new Date().toISOString().split('T')[0];
  expenses.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    amount: rec.amount,
    category: rec.category,
    note: `[Recurring] ${rec.name}`,
    date: today,
    time: '12:00 AM',
    type: 'expense'
  });
}

// ── Google Sheets Sync ──
function syncExpenses() {
  if (!expenses.length) return;
  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'syncAll',
      expenses: expenses,
      timestamp: new Date().toISOString()
    })
  }).catch(() => {});
}

function syncSettings() {
  fetch(GOOGLE_SHEETS_URL, {
    method: 'POST',
    body: JSON.stringify({
      action: 'saveSettings',
      settings: settings,
      timestamp: new Date().toISOString()
    })
  }).catch(() => {});
}

function syncToSheets() {
  const btn = document.getElementById('syncBtn');
  const status = document.getElementById('syncStatus');

  btn.disabled = true;
  status.textContent = 'Syncing...';
  status.classList.add('syncing');

  Promise.all([
    fetch(GOOGLE_SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'syncAll',
        expenses: expenses,
        timestamp: new Date().toISOString()
      })
    }),
    fetch(GOOGLE_SHEETS_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'saveSettings',
        settings: settings,
        timestamp: new Date().toISOString()
      })
    })
  ]).then(() => {
    status.textContent = 'Synced!';
    status.classList.remove('syncing');
    status.classList.add('synced');
    showSnack('Data synced to Google Sheets');
    setTimeout(() => {
      btn.disabled = false;
      status.textContent = '';
      status.classList.remove('synced');
    }, 2000);
  }).catch(() => {
    status.textContent = 'Sync failed';
    status.classList.remove('syncing');
    status.classList.add('error');
    btn.disabled = false;
  });
}

// ── Export / Import ──
function exportData() {
  const data = JSON.stringify({
    settings,
    expenses,
    recurring,
    exportDate: new Date().toISOString()
  }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `cashflow-backup-${getCurrentMonthKey()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showSnack('Data exported');
}

function importData() { document.getElementById('importFile').click(); }
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.settings) { settings = data.settings; saveJSON('cf_settings', settings); }
      if (data.expenses) { expenses = data.expenses; saveJSON('cf_expenses', expenses); }
      if (data.recurring) { recurring = data.recurring; saveJSON('cf_recurring', recurring); }
      showSnack('Data imported!');
      switchScreen('dashboard');
    } catch { showSnack('Invalid file'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── Init ──
buildCatGrid();
generateRecurringExpenses();
renderDashboard();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
